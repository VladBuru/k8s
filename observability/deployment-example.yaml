apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-app
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: my-app
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "http-pod"
        prometheus.io/path: "/resignation-app-service/actuator/prometheus"
    spec:
      containers:
        - image: nginx:1.24
          name: nginx
          ports:
            - containerPort: 80